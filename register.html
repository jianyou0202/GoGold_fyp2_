<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldTrade - Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">GoGold</div>
            <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">Menu</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="backtest.html">Strategy Tester</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li><a href="market.html">Market Insights</a></li>
                <li><a href="ideas.html">Idea</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="tutorial.html">Tutorial</a></li>
                <li id="nav-auth-area"></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Create Account</h1>
            <p>Register to save your strategies, share ideas, and build your trading wishlist.</p>
        </section>

        <section class="auth-section">
            <div class="auth-card">
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="reg-name">Display Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">Confirm Password</label>
                        <input type="password" id="reg-confirm" required minlength="6">
                    </div>
                    <div class="auth-actions">
                        <button class="btn buy" type="submit">Register</button>
                        <a class="link-btn" href="login.html">Already have an account?</a>
                    </div>
                    <div class="auth-message" id="register-message"></div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GoldTrade. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
